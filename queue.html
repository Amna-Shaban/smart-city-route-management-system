<!DOCTYPE html>
<html>
<head>
    <title>Queue View</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Trip Queue</h1>

<div class="container">

    {% if requests %}
        <ul>
            {% for r in requests %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No items in queue.</p>
    {% endif %}

    <a href="/">Back to Home</a>

</div>

</body>
</html>
