<!DOCTYPE html>
<html>
<head>
    <title>Find Route</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Smart City Route Finder</h1>

<div class="container">

    <h2>Find Route Between Cities</h2>

    <!-- FORM -->
    <form method="POST">

        <label>Start City</label>
        <select name="start" required>
            {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
            {% endfor %}
        </select>

        <label>Destination City</label>
        <select name="end" required>
            {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
            {% endfor %}
        </select>

        <button type="submit">Find Route</button>

    </form>

    <!-- RESULT SECTION -->
    {% if route %}
        <h3>Shortest Route:</h3>

        <div class="route-box">
            <p>
                {% for city in route %}
                    {{ city }}
                    {% if not loop.last %}
                        →
                    {% endif %}
                {% endfor %}
            </p>
        </div>
    {% endif %}

    <br>

    <a class="back" href="/">← Back to Home</a>

</div>

</body>
</html>
