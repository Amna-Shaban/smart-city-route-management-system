<!DOCTYPE html>
<html>
<head>
    <title>Trip Plan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Trip Planning System (Queue)</h1>

<div class="container">

    <!-- ADD CITY TO TRIP -->
    <form method="POST">

        <label>Select City</label>
        <select name="city" required>
            {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
            {% endfor %}
        </select>

        <button type="submit">Add to Trip</button>

    </form>

    <!-- CURRENT QUEUE -->
    <h3>Planned Trip (Queue Order)</h3>

    {% if plan %}
        <ul>
            {% for city in plan %}
                <li>{{ city }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No cities in trip plan.</p>
    {% endif %}

    <!-- COMPLETE TRIP -->
    <a href="/complete_trip">Complete Trip</a>

</div>

</body>
</html>
